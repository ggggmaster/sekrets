<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incognito Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f12;
            --card-bg: #1a1a20;
            --accent: #ff2e63;
            --text: #e0e0e0;
            --secondary: #08d9d6;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Навигация */
        nav {
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav button {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        nav button:hover, nav button.active {
            background: var(--secondary);
            color: var(--bg);
        }

        /* Контент */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            flex-grow: 1;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
        }

        h2 { color: var(--accent); }

        /* Чат / Форма */
        .chat-box {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea, input {
            width: 100%;
            background: #25252d;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-send {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover { opacity: 0.8; transform: translateY(-2px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { text-align: center; padding: 20px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('gossip')" id="btn-gossip" class="active">Сплетни и Рассказы</button>
    <button onclick="showTab('couples')" id="btn-couples">Пары в отношениях</button>
    <button onclick="showTab('admin')" id="btn-admin">Связаться с Admin</button>
</nav>

<div class="container">
    
    <div id="gossip" class="tab-content active">
        <h2>Последние истории</h2>
        <div class="card">
       
        </div>
        <div class="card">
        отсос во дворе
        </div>
    </div>

    <div id="couples" class="tab-content">
        <h2>Рейтинг и новости пар</h2>
        <div class="card">
    
        </div>
        <div class="card">
          
        </div>
    </div>

    <div id="admin" class="tab-content">
        <div class="chat-box">
            <h2>Написать админу</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Отправьте свою сплетню или историю. Она появится на сайте после модерации. Полная анонимность гарантирована.</p>
            
            <form action="https://formspree.io/f/sample" method="POST">
                <input type="text" name="subject" placeholder="Тема (Сплетня / Пара / История)" required>
                <textarea name="message" rows="6" placeholder="Ваша история во всех деталях..." required></textarea>
                <button type="submit" class="btn-send">ОТПРАВИТЬ АНОНИМНО</button>
            </form>
        </div>
    </div>

</div>

<footer>
    &copy; 2026 Инкогнито Портал
</footer>

<script>
    function showTab(tabId) {
        // Скрываем все вкладки
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.classList.remove('active');
        });
        // Убираем активный класс с кнопок
        document.querySelectorAll('nav button').forEach(btn => {
            btn.classList.remove('active');
        });
        
        // Показываем нужную
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    }
</script>

</body>

</html>
